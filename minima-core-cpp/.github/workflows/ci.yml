name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-15
            cxx: clang++-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake build-essential ninja-build libssl-dev
          if [[ "${{ matrix.compiler }}" == "gcc" && "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            sudo apt-get install -y gcc-12 g++-12 2>/dev/null || true
          fi
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            sudo apt-get install -y clang-15 2>/dev/null || \
            sudo apt-get install -y clang 2>/dev/null || true
          fi

      - name: Configure (OpenSSL enabled — real RSA MULTISIG)
        working-directory: minima-core-cpp
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMA_BUILD_TESTS=ON \
            -DMINIMA_CRYPTO_OPENSSL=ON \
            -G Ninja

      - name: Build
        working-directory: minima-core-cpp
        run: cmake --build build --parallel

      - name: Test
        working-directory: minima-core-cpp
        run: ctest --test-dir build --output-on-failure --parallel 4

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Report
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "✅ All builds and tests passed (OpenSSL + real RSA MULTISIG)"
          else
            echo "❌ Build or test failure detected"
            exit 1
          fi
